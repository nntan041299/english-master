word.enrichment.prompt=Translate these English words into Vietnamese. Return ONLY valid JSON as an array in this format: [ { "word": "car", "meaning": "xe hơi", "partOfSpeech": "noun", "ipa": "/kɑːr/" } ] Rules: - Words, meanings are lowercase. - If a word has multiple meanings, return one object per meaning. - "partOfSpeech" must be one of: %s. - "ipa" must be the standard IPA transcription for the word (British or American English), same value for every entry of the same word. - If a word is not a real English word or has no known meaning, return exactly one object for it with "partOfSpeech": "OTHER". - No explanations or markdown. Words: %s
word.meaning.practice.generation.prompt=Generate %d Vietnamese multiple-choice questions per word meaning. Return ONLY a JSON array: [{"index":0,"practices":[{"question":"...","options":[{"id":"1","text":"..."},{"id":"2","text":"..."},{"id":"3","text":"..."},{"id":"4","text":"..."}],"correctAnswer":["2"]}]}]. Rules: preserve index from input; exactly %d practices per entry; question is a short English prompt asking for the meaning of the word; each practice has exactly 4 options with ids "1","2","3","4"; correctAnswer is a JSON array of option ids in the required selection order that match the correct meaning; for single-choice questions it contains one id; vary the correct answer position across questions; 3 distractors must be plausible but wrong Vietnamese meanings; all option text values are lower case; no markdown. Word meanings: %s
