name: CI

on:
  pull_request:
    branches: [develop, staging, main]
  push:
    branches: [develop]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'english-master-service/**'
            frontend:
              - 'english-master-ui/**'

  backend:
    name: Backend — Build & Test
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: temurin
          cache: maven

      - name: Build & test
        working-directory: english-master-service
        run: mvn clean install

  frontend:
    name: Frontend — Lint & Build
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: english-master-ui/package-lock.json

      - name: Install dependencies
        working-directory: english-master-ui
        run: npm ci

      - name: Lint
        working-directory: english-master-ui
        run: npm run lint

      - name: Format check
        working-directory: english-master-ui
        run: npm run format:check

      - name: Build
        working-directory: english-master-ui
        run: npm run build
