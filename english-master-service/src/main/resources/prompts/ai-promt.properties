word.enrichment.prompt=Translate these English words into Vietnamese. Return ONLY valid JSON as an array in this format: [ { "word": "car", "meaning": "xe hơi", "partOfSpeech": "noun", "ipa": "/kɑːr/" } ] Rules: - Words, meanings are lowercase. - If a word has multiple meanings, return one object per meaning. - "partOfSpeech" must be one of: %s. - "ipa" must be the standard IPA transcription for the word (British or American English), same value for every entry of the same word. - If a word is not a real English word or has no known meaning, return exactly one object for it with "partOfSpeech": "OTHER". - No explanations or markdown. Words: %s
word.translation.practice.generation.prompt=Generate %d Vietnamese multiple-choice questions per word meaning. Return ONLY a JSON array: [{"index":0,"practices":[{"question":"...","options":[{"id":"1","text":"..."},{"id":"2","text":"..."},{"id":"3","text":"..."},{"id":"4","text":"..."}],"correctAnswer":["2"]}]}]. Rules: preserve index from input; exactly %d practices per entry; question is a short English prompt asking for the meaning of the word; each practice has exactly 4 options with ids "1","2","3","4"; correctAnswer is a JSON array of option ids in the required selection order that match the correct meaning; for single-choice questions it contains one id; vary the correct answer position across questions; 3 distractors must be plausible but wrong Vietnamese meanings; all option text values are lower case; no markdown. Word meanings: %s
synonym.practice.generation.prompt=Generate up to %d English synonym multiple-choice questions per word meaning. Return ONLY a JSON array: [{"index":0,"practices":[{"question":"...","options":[{"id":"1","text":"..."},{"id":"2","text":"..."},{"id":"3","text":"..."},{"id":"4","text":"..."}],"correctAnswer":["2"]}]}]. Rules: preserve index from input; generate at most %d practices per entry; the input "meaning" is the Vietnamese meaning that fixes which sense of the word to use; question is a short English prompt asking which word is a synonym of the given word for that sense; each practice has exactly 4 options with ids "1","2","3","4"; each option text is a single English word or short phrase; exactly one option is a correct English synonym of the word for the given sense; correctAnswer is a JSON array containing the single id of the correct synonym; vary the correct answer position across questions; the 3 distractors must be plausible English words that are NOT synonyms for that sense; all option text values are lower case; if the word has no genuine English synonym for that sense, return "practices" as an empty array for that entry; no markdown. Word meanings: %s
