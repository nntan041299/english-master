version: '3.8'

services:
  english-master-db:
    image: postgres:16.11-alpine
    container_name: english-master-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: english-master-db
    ports:
      - "5432:5432"
    volumes:
      - english-master-db:/var/lib/postgresql/data

volumes:
  english-master-db:
