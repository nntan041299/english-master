name: Deploy — Staging

on:
  push:
    branches: [staging]

env:
  REGISTRY: docker.io

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'english-master-service/**'
            frontend:
              - 'english-master-ui/**'

  backend:
    name: Backend — Build & Push Image
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: temurin
          cache: maven

      - name: Extract artifact ID and version from pom.xml
        id: pom
        working-directory: english-master-service
        run: |
          ARTIFACT_ID=$(mvn help:evaluate -Dexpression=project.artifactId -q -DforceStdout)
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "image_name=${{ secrets.DOCKERHUB_USERNAME }}/${ARTIFACT_ID}" >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Build JAR
        working-directory: english-master-service
        run: mvn -B package -DskipTests

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: english-master-service
          push: true
          tags: ${{ steps.pom.outputs.image_name }}:${{ steps.pom.outputs.version }}

  frontend:
    name: Frontend — Lint & Format Check
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: english-master-ui/package-lock.json

      - name: Install dependencies
        working-directory: english-master-ui
        run: npm ci

      - name: Lint
        working-directory: english-master-ui
        run: npm run lint

      - name: Format check
        working-directory: english-master-ui
        run: npm run format:check
