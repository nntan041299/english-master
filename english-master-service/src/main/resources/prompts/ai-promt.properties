word.enrichment.prompt=Translate these English words into Vietnamese. Return ONLY valid JSON as an array in this format: [ { "word": "car", "meaning": "xe h?i", "partOfSpeech": "noun" } ] Rules: - Preserve the original word. - If a word has multiple meanings, return one object per meaning. - "partOfSpeech" must be one of: %s. - If a word is not a real English word or has no known meaning, return exactly one object for it with "partOfSpeech": "OTHER". - No explanations or markdown. Words: %s
word.meaning.practice.generation.prompt=Generate %d multiple-choice practice questions for each of the following word meanings. Each question asks the user to pick the correct Vietnamese meaning from 4 options. Word meanings: %s Rules: - Return ONLY a valid JSON array, one object per word meaning, in this format: [ { "index": 0, "practices": [ { "option1": "...", "option2": "...", "option3": "...", "option4": "...", "correctAnswer": "OPTION_1"|"OPTION_2"|"OPTION_3"|"OPTION_4" } ] } ]. - Preserve the original index value for each entry. - Each entry must have exactly %d practice objects. - The correct option must be the exact meaning provided; vary its position across questions. - The 3 distractors must be plausible but clearly wrong Vietnamese meanings. - No explanations or markdown.
