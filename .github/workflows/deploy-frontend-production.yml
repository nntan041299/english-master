name: Deploy Frontend — Production

on:
  push:
    tags:
      - 'frontend/v*.*.*'

jobs:
  verify:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: english-master-ui/package-lock.json

      - name: Install dependencies
        working-directory: english-master-ui
        run: npm ci

      - name: Lint
        working-directory: english-master-ui
        run: npm run lint

      - name: Format check
        working-directory: english-master-ui
        run: npm run format:check

  bump-version:
    name: Bump package.json version on develop
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4
        with:
          ref: develop
          token: ${{ secrets.PAT_TOKEN }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: english-master-ui/package-lock.json

      - name: Compute next version
        id: next
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#frontend/v}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)
          echo "semver=${MAJOR}.${MINOR}.$((PATCH + 1))" >> $GITHUB_OUTPUT

      - name: Bump package.json
        working-directory: english-master-ui
        run: npm version ${{ steps.next.outputs.semver }} --no-git-tag-version

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add english-master-ui/package.json
          git commit -m "chore(frontend): bump version to ${{ steps.next.outputs.semver }}"
          git push origin develop
