word.enrichment.prompt=Translate these English words into Vietnamese. Return ONLY valid JSON as an array in this format: [ { "word": "car", "meaning": "xe hơi", "partOfSpeech": "noun", "ipa": "/kɑːr/", "categories": ["vehicle"] } ] Rules: - Words, meanings are lowercase. - Return exactly one object per word, using only its most common/famous meaning. - "partOfSpeech" must be one of: %1$s. - "ipa" must be the standard IPA transcription for the word (British or American English), same value for every entry of the same word. - "categories" is a JSON array of 1-3 lowercase topical categories for that meaning (e.g. "animal", "food", "technology", "emotion"). - Existing categories already in the system: %2$s. - If a word is not a real English word or has no known meaning, return exactly one object for it with "partOfSpeech": "OTHER" and "categories": []. - No explanations or markdown. Words: %3$s
word.translation.practice.generation.prompt=Generate %d Vietnamese multiple-choice questions per word meaning. Return ONLY a JSON array: [{"index":0,"practices":[{"question":"...","options":[{"id":"1","text":"..."},{"id":"2","text":"..."},{"id":"3","text":"..."},{"id":"4","text":"..."}],"correctAnswer":["2"]}]}]. Rules: preserve index from input; exactly %d practices per entry; question is a short English prompt asking for the meaning of the word; each practice has exactly 4 options with ids "1","2","3","4"; correctAnswer is a JSON array of option ids in the required selection order that match the correct meaning; for single-choice questions it contains one id; vary the correct answer position across questions; 3 distractors must be plausible but wrong Vietnamese meanings; all option text values are lower case; no markdown. Word meanings: %s
synonym.practice.generation.prompt=Generate up to %d English synonym multiple-choice questions per word meaning. Return ONLY a JSON array: [{"index":0,"practices":[{"question":"...","options":[{"id":"1","text":"..."},{"id":"2","text":"..."},{"id":"3","text":"..."},{"id":"4","text":"..."}],"correctAnswer":["2"]}]}]. Rules: preserve index from input; generate at most %d practices per entry; the input "meaning" is the Vietnamese meaning that fixes which sense of the word to use; question is a short English prompt asking which word is a synonym of the given word for that sense; each practice has exactly 4 options with ids "1","2","3","4"; each option text is a single English word or short phrase; exactly one option is a correct English synonym of the word for the given sense; correctAnswer is a JSON array containing the single id of the correct synonym; vary the correct answer position across questions; the 3 distractors must be plausible English words that are NOT synonyms for that sense; all option text values are lower case; if the word has no genuine English synonym for that sense, return "practices" as an empty array for that entry; no markdown. Word meanings: %s
writing.challenge.generation.prompt=Create ONE short English writing challenge for a language learner at CEFR level %1$s. The learner must write between %2$d and %3$d words. Return ONLY valid JSON in this exact shape: {"title":"...","prompt":"..."}. Rules: "title" is a short catchy topic of at most 8 words; "prompt" is 1-3 sentences telling the learner what to write about, ending with a clear instruction that explicitly states the required length as "%2$d-%3$d words"; use vocabulary and grammar the learner can reasonably be expected to know at CEFR level %1$s; use natural, encouraging English; the task must be answerable as free-form writing with no external knowledge required; vary the topic so it feels fresh; no markdown, no code fences, no text outside the JSON.
writing.feedback.prompt=You are an English writing tutor. A learner at CEFR level %1$s was given this writing task, which required between %2$d and %3$d words: "%4$s". The learner wrote %7$d words: "%5$s". Assess the learner's text against what is reasonably expected at CEFR level %1$s (do not penalise the learner for not using grammar or vocabulary beyond that level) and return ONLY valid JSON in this exact shape: {"overallFeedback":"...","score":0,"issues":[{"original":"...","suggestion":"...","explanation":"...","type":"GRAMMAR"}]}. Rules: "overallFeedback" is 2-4 encouraging sentences, pitched in language the learner's own level can understand, summarising strengths and the main things to improve, and mentioning that the response was %7$d words against the %2$d-%3$d word target; "score" is an integer 0-100 rating the writing against CEFR level %1$s expectations; "issues" lists concrete mistakes or improvements, each with: "original" = the EXACT substring copied verbatim from the learner's text (must appear character-for-character so it can be located, do not paraphrase or add quotes), "suggestion" = the improved replacement for that substring, "explanation" = one short sentence on why, in simple language; "type" is exactly one of these values: %6$s; only include genuine issues (empty array if the text is flawless); do not overlap the "original" spans; base feedback only on the learner's text; no markdown, no code fences, no text outside the JSON.
translation.challenge.generation.prompt=Generate ONE %1$s sentence for a language learner at CEFR level %2$s to translate. Return ONLY valid JSON in this exact shape: {"sourceText":"..."}. Rules: the sentence must be %3$d-%4$d words long; use vocabulary and grammar appropriate for CEFR level %2$s; the sentence must be natural, self-contained, and require no external or cultural knowledge to translate; avoid proper nouns, idioms, and ambiguous references; vary the topic and structure so it feels fresh each time; no markdown, no code fences, no text outside the JSON.
translation.feedback.prompt=You are a translation tutor helping a learner at CEFR level %1$s practice translating from %2$s to %3$s. The original %2$s sentence is: "%4$s". The learner translated it as: "%5$s". Judge whether the learner's translation correctly conveys the meaning of the original sentence in natural %3$s (minor differences in phrasing or word order are fine as long as the meaning and key details are preserved; do not require a word-for-word match). Return ONLY valid JSON in this exact shape: {"correct":true,"feedback":"...","suggestedTranslation":"..."}. Rules: "correct" is a boolean, true only if the translation is accurate and natural enough to be considered correct at this level; "feedback" is 1-3 encouraging sentences in simple language explaining what was right or wrong, pitched for CEFR level %1$s; "suggestedTranslation" is a natural, correct %3$s translation of the original sentence, provided even when the learner's answer was already correct, as a reference; no markdown, no code fences, no text outside the JSON.
listening.challenge.generation.prompt=Generate ONE natural English sentence for a language learner at CEFR level %1$s to practice listening and dictation. Return ONLY valid JSON in this exact shape: {"sentence":"..."}. Rules: the sentence must be %2$d-%3$d words long; use vocabulary and grammar appropriate for CEFR level %1$s; the sentence must be natural, self-contained, and clearly pronounceable when read aloud (avoid ambiguous homophones, abbreviations, and numerals or symbols that are hard to distinguish by ear); vary the topic and structure so it feels fresh each time; no markdown, no code fences, no text outside the JSON.
listening.feedback.prompt=You are a listening and dictation tutor for a learner at CEFR level %1$s. The correct sentence, which was read aloud to the learner, is: "%2$s". The learner listened and typed: "%3$s". Judge whether the learner's typed text is an accurate transcription of the correct sentence (ignore differences in capitalization and punctuation, but the words themselves and their order must match; treat missing words, extra words, or clearly different words as mistakes). Return ONLY valid JSON in this exact shape: {"correct":true,"feedback":"..."}. Rules: "correct" is a boolean, true only if the transcription accurately captures every word of the sentence in order; "feedback" is 1-3 encouraging sentences in simple language, pitched for CEFR level %1$s, specifically naming which word(s) were missed or wrong if incorrect, or briefly praising accuracy if correct; no markdown, no code fences, no text outside the JSON.
