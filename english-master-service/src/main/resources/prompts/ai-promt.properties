word.enrichment.prompt=Translate these English words into Vietnamese. Return ONLY valid JSON as an array in this format: [ { "word": "car", "meaning": "xe hơi", "partOfSpeech": "noun", "ipa": "/kɑːr/" } ] Rules: - Words, meanings are lowercase. - If a word has multiple meanings, return one object per meaning. - "partOfSpeech" must be one of: %s. - "ipa" must be the standard IPA transcription for the word (British or American English), same value for every entry of the same word. - If a word is not a real English word or has no known meaning, return exactly one object for it with "partOfSpeech": "OTHER". - No explanations or markdown. Words: %s
word.meaning.practice.generation.prompt=Generate %d Vietnamese multiple-choice questions per word meaning. Return ONLY a JSON array: [{"index":0,"practices":[{"option1":"...","option2":"...","option3":"...","option4":"...","correctAnswer":"OPTION_1"|"OPTION_2"|"OPTION_3"|"OPTION_4"}]}]. Rules: preserve index; exactly %d practices per entry; correct option = exact meaning provided, vary its position; 3 distractors must be plausible but wrong; all options are lower case; no markdown. Word meanings: %s
